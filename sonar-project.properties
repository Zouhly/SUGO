sonar.projectKey=Zouhly_SUGO
sonar.organization=zouhly


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=SUGO
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=lib

# Test coverage
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclude auto-generated files from analysis and coverage
sonar.exclusions=lib/firebase_options.dart
